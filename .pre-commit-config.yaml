repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: biome-check
        name: biome check (frontend)
        entry: bash -c 'cd frontend && pnpm biome check --fix ./src'
        language: system
        files: ^frontend/src/
        pass_filenames: false
