repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: biome-check
        name: biome check (frontend)
        entry: bash -c 'cd frontend && pnpm biome check --fix ./src'
        language: system
        files: ^frontend/src/
        pass_filenames: false

      - id: mypy
        name: mypy (backend)
        entry: bash -c 'cd backend && uv run python -m mypy src/'
        language: system
        files: ^backend/src/
        pass_filenames: false

      - id: tsc
        name: tsc --noEmit (frontend)
        entry: bash -c 'cd frontend && pnpm exec tsc --noEmit'
        language: system
        files: ^frontend/src/
        pass_filenames: false
