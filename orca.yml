orca_version: 0.1.0
tracker:
  kind: linear
  api_key: $LINEAR_API_KEY
  project_slug: TRE
  active_states: Scoping, Planning, Design Feedback Loop, Implementing, Validating,
    Docs, Review
  terminal_states: Done, Closed, Cancelled
  success_terminal_states: Done
polling:
  interval_ms: 30000
workspace:
  root: ~/orca_workspaces
hooks:
  after_create: git clone $REPO_URL . && (git checkout {{issue.identifier}} && git pull origin main --rebase --no-edit || git checkout -b {{issue.identifier}})
  before_run: mkdir -p .orca && git stash --include-untracked -q && git fetch origin main && git merge origin/main --no-edit || true
  timeout_ms: 120000
agent:
  max_concurrent_agents: 5
  max_turns: 30
  max_retry_backoff_ms: 300000
opencode:
  model: claude-opus-4-6
server:
  port: 8080
