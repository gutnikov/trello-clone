name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_CACHE_DIR: /home/deploy/.cache/uv
  PNPM_HOME: /home/deploy/.local/share/pnpm
  COREPACK_HOME: /home/deploy/.cache/corepack

jobs:
  lint:
    name: Lint & Format
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (if missing)
        run: which uv || curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install backend dependencies
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          cd backend && uv sync --all-extras

      - name: Run pre-commit
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          cd backend && uv run pre-commit run --all-files

      - name: Install pnpm + frontend dependencies
        run: |
          corepack enable || true
          corepack prepare pnpm@10 --activate || npm install -g pnpm@10
          cd frontend && pnpm install --frozen-lockfile

      - name: Type check (backend)
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          cd backend && uv run python -m mypy src/

      - name: Type check (frontend)
        run: cd frontend && pnpm exec tsc --noEmit

  test:
    name: Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (if missing)
        run: which uv || curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install backend dependencies
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          cd backend && uv sync --all-extras

      - name: Run backend tests
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          cd backend && uv run python -m pytest tests/ -v

      - name: Install pnpm + frontend dependencies
        run: |
          corepack enable || true
          corepack prepare pnpm@10 --activate || npm install -g pnpm@10
          cd frontend && pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: cd frontend && pnpm vitest run
