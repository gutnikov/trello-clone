name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_CACHE_DIR: /home/deploy/.cache/uv
  PNPM_HOME: /home/deploy/.local/share/pnpm

jobs:
  lint:
    name: Lint & Format
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup tooling
        run: |
          export PATH="$HOME/.local/bin:$PNPM_HOME:$PATH"
          # uv
          which uv || curl -LsSf https://astral.sh/uv/install.sh | sh
          # pnpm (user-local via npm)
          which pnpm || npm install -g --prefix "$HOME/.local" pnpm@10
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$PNPM_HOME" >> "$GITHUB_PATH"

      - name: Install backend dependencies
        run: cd backend && uv sync --all-extras

      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Run pre-commit
        run: cd backend && uv run pre-commit run --all-files

      - name: Type check (backend)
        run: cd backend && uv run python -m mypy src/

      - name: Type check (frontend)
        run: cd frontend && pnpm exec tsc --noEmit

  test:
    name: Test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup tooling
        run: |
          export PATH="$HOME/.local/bin:$PNPM_HOME:$PATH"
          which uv || curl -LsSf https://astral.sh/uv/install.sh | sh
          which pnpm || npm install -g --prefix "$HOME/.local" pnpm@10
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$PNPM_HOME" >> "$GITHUB_PATH"

      - name: Install backend dependencies
        run: cd backend && uv sync --all-extras

      - name: Run backend tests
        run: cd backend && uv run python -m pytest tests/ -v

      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: cd frontend && pnpm vitest run
