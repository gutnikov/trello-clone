name: Deploy Staging

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  issues: write

concurrency:
  group: staging-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  STAGING_HOST: 2.56.122.47
  STAGING_USER: deploy
  STAGING_DIR: /home/deploy/staging
  PNPM_HOME: /home/deploy/.local/share/pnpm

jobs:
  deploy:
    name: Deploy PR Preview
    runs-on: self-hosted
    outputs:
      preview-url: ${{ steps.deploy.outputs.preview_url }}
      backend-port: ${{ steps.ports.outputs.backend_port }}
      frontend-port: ${{ steps.ports.outputs.frontend_port }}
    steps:
      - uses: actions/checkout@v4

      # Each PR gets its own isolated Docker Compose stack.
      # Ports are derived from the PR number to avoid collisions:
      #   PR #1  -> backend:9001, frontend:4001
      #   PR #42 -> backend:9042, frontend:4042
      - name: Compute per-PR ports
        id: ports
        run: |
          PR=${{ github.event.pull_request.number }}
          echo "backend_port=$((9000 + PR))" >> "$GITHUB_OUTPUT"
          echo "frontend_port=$((4000 + PR))" >> "$GITHUB_OUTPUT"
          echo "project_name=preview-pr-${PR}" >> "$GITHUB_OUTPUT"

      - name: Deploy preview stack
        id: deploy
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BACKEND_PORT: ${{ steps.ports.outputs.backend_port }}
          FRONTEND_PORT: ${{ steps.ports.outputs.frontend_port }}
          PROJECT: ${{ steps.ports.outputs.project_name }}
        run: |
          PREVIEW_DIR="${STAGING_DIR}/pr-${PR_NUMBER}"

          # Create per-PR directory with a clean checkout
          mkdir -p "${PREVIEW_DIR}"
          rsync -a --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.venv' \
            --exclude='__pycache__' \
            ./ "${PREVIEW_DIR}/"

          # Build and start the isolated stack
          cd "${PREVIEW_DIR}"
          PR_NUMBER="${PR_NUMBER}" \
          BACKEND_PORT="${BACKEND_PORT}" \
          FRONTEND_PORT="${FRONTEND_PORT}" \
            docker compose \
              -f docker-compose.staging.yml \
              -p "${PROJECT}" \
              up -d --build --wait --remove-orphans

          PREVIEW_URL="http://${STAGING_HOST}:${FRONTEND_PORT}"
          echo "preview_url=${PREVIEW_URL}" >> "$GITHUB_OUTPUT"
          echo "Preview running at ${PREVIEW_URL}"
          echo "Backend API at http://${STAGING_HOST}:${BACKEND_PORT}"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '### Preview Deployment',
              '',
              `| Service | URL |`,
              `|---------|-----|`,
              `| Frontend | ${{ steps.deploy.outputs.preview_url }} |`,
              `| Backend API | http://${{ env.STAGING_HOST }}:${{ steps.ports.outputs.backend_port }} |`,
              `| Health check | http://${{ env.STAGING_HOST }}:${{ steps.ports.outputs.backend_port }}/health |`,
              '',
              `_Stack: \`${{ steps.ports.outputs.project_name }}\`_`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('### Preview Deployment'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  e2e:
    name: E2E Tests
    needs: [deploy]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Setup tooling
        run: |
          export PATH="$HOME/.local/bin:$PNPM_HOME:$PATH"
          which pnpm || npm install -g --prefix "$HOME/.local" pnpm@10
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$PNPM_HOME" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: cd frontend && pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests against preview
        env:
          BASE_URL: ${{ needs.deploy.outputs.preview-url }}
          CI: "true"
        run: cd frontend && pnpm e2e
