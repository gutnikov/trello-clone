name: Deploy Staging

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t trello-clone-backend:pr-${{ github.event.pull_request.number }} ./backend

      - name: Build frontend image
        run: docker build -t trello-clone-frontend:pr-${{ github.event.pull_request.number }} ./frontend

      # CUSTOMIZE: Push images to a container registry and deploy to staging
